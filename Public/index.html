<!DOCTYPE html>
<html>
<head>
    <title>Sales CSV Reader</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .action-panel {
            display: none;
            text-align: center;
            margin: 20px 0;
            padding: 15px;
            background: #f4f6f9;
            border-radius: 8px;
            border: 1px dashed #ccc;
        }
        .btn-continue { background-color: #28a745; color: white; padding: 10px 20px; border: none; cursor: pointer; font-size: 16px; margin-right: 10px; border-radius: 4px; }
        .btn-cancel { background-color: #dc3545; color: white; padding: 10px 20px; border: none; cursor: pointer; font-size: 16px; border-radius: 4px; }
        .date-selector-container { margin: 15px 0; display: none; }
        select { padding: 8px; font-size: 14px; border-radius: 4px; width: 200px; }
    </style>
</head>
<body>

<div class="container">

    <div class="header">
        <h1>📊 Sales CSV Reader</h1>
        <p>Upload your POS sales export file</p>
    </div>

    <div class="upload-card">
        <input type="file" id="csvFile" accept=".csv">
        <button id="scanBtn">1. Scan File Dates</button>
        
        <div id="dateSelectorContainer" class="date-selector-container">
            <label for="dateSelect"><strong>Select Date to Upload:</strong> </label>
            <select id="dateSelect"></select>
            <button id="uploadBtn" style="margin-left: 10px;">2. Analyze Selected Date</button>
        </div>
    </div>

    <div id="actionPanel" class="action-panel">
        <h3>⚠️ Review Summary Below. Do you want to process this upload?</h3><br>
        <button class="btn-continue" onclick="handleAction('continue')">Continue Upload</button>
        <button class="btn-cancel" onclick="handleAction('cancel')">Cancel</button>
    </div>

    <div id="summary" class="summary"></div>

    <div class="json-card">
        <h3>JSON Preview</h3>
        <pre id="jsonOutput"></pre>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
